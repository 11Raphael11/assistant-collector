services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vosool
      POSTGRES_PASSWORD: vosool_dev
      POSTGRES_DB: vosool_yar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vosool -d vosool_yar"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
